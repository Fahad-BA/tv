<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        :root {
            --tvtime-gold: #FFD300;
            --tvtime-dark: #000000;
            --tvtime-gray: #1A1A1A;
            --tvtime-light: #F5F5F5;
        }

        body { 
            background-color: var(--tvtime-dark); 
            color: var(--tvtime-light); 
            font-family: 'Poppins', sans-serif; 
            margin-bottom: 80px; /* Space for mobile bottom nav */
        }

        .gold-text { color: var(--tvtime-gold); }
        .gold-bg { background-color: var(--tvtime-gold); }
        .gray-bg { background-color: var(--tvtime-gray); }
        
        .nav-item.active { color: var(--tvtime-gold); border-bottom: 2px solid var(--tvtime-gold); }
        .mobile-nav-item.active { color: var(--tvtime-gold); }

        .progress-bar { height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--tvtime-gold); }

        .poster-card { position: relative; border-radius: 12px; overflow: hidden; aspect-ratio: 2/3; background: #111; }
        .poster-overlay { 
            position: absolute; bottom: 0; left: 0; right: 0; 
            background: linear-gradient(transparent, rgba(0,0,0,0.9)); 
            padding: 10px;
        }

        .modal-backdrop { background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        
        /* Hide scrollbar */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>

    <!-- Desktop Header -->
    <header class="hidden md:flex sticky top-0 z-50 bg-black/90 px-8 py-4 justify-between items-center border-b border-white/10">
        <div class="flex items-center gap-10">
            <h1 class="text-2xl font-bold gold-text tracking-tighter">TV TIME</h1>
            <nav class="flex gap-8">
                <a href="/" class="nav-item active font-semibold transition">Watchlist</a>
                <a href="/upcoming" class="nav-item font-semibold text-gray-400 hover:text-white transition">Upcoming</a>
                <a href="/import" class="nav-item font-semibold text-gray-400 hover:text-white transition">Import</a>
            </nav>
        </div>
        <div id="auth-header" class="flex items-center gap-4">
            <button onclick="searchMedia()" class="w-10 h-10 rounded-full gray-bg flex items-center justify-center hover:scale-110 transition">
                <i class="fas fa-search"></i>
            </button>
            <div id="user-profile"></div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <div id="page-content">
            <!-- Dynamic Content -->
            <div id="watchlist-view">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">Watchlist</h2>
                    <span id="watchlist-count" class="text-gray-500 font-medium">0 shows</span>
                </div>
                <div id="media-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6">
                    <!-- Cards -->
                </div>
            </div>
            
            <div id="import-view" class="hidden text-center py-20">
                <h2 class="text-3xl font-bold mb-4">Import TV Time Data</h2>
                <p class="text-gray-400 mb-8 max-w-md mx-auto">Upload your JSON or CSV export from TV Time to automatically sync your library.</p>
                <div class="max-w-md mx-auto p-8 border-2 border-dashed border-gray-700 rounded-3xl gray-bg">
                    <i class="fas fa-file-import text-4xl mb-4 gold-text"></i>
                    <p class="mb-6 font-medium">Drag & Drop or Click to Upload</p>
                    <input type="file" id="import-file" class="hidden" accept=".json,.csv" onchange="handleImport(this)">
                    <button onclick="document.getElementById('import-file').click()" class="gold-bg text-black px-8 py-3 rounded-full font-bold hover:scale-105 transition">Select File</button>
                    <p id="import-status" class="mt-4 text-sm text-gray-500"></p>
                </div>
            </div>
        </div>
    </main>

    <!-- Mobile Navigation -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-black border-t border-white/10 px-6 py-3 flex justify-between items-center z-50">
        <a href="/" class="mobile-nav-item active flex flex-col items-center gap-1">
            <i class="fas fa-list-ul"></i>
            <span class="text-[10px]">Watchlist</span>
        </a>
        <a href="/upcoming" class="mobile-nav-item flex flex-col items-center gap-1 text-gray-500">
            <i class="far fa-calendar-alt"></i>
            <span class="text-[10px]">Upcoming</span>
        </a>
        <button onclick="searchMedia()" class="w-12 h-12 gold-bg text-black rounded-full flex items-center justify-center -mt-8 shadow-lg">
            <i class="fas fa-plus text-xl"></i>
        </button>
        <a href="/import" class="mobile-nav-item flex flex-col items-center gap-1 text-gray-500">
            <i class="fas fa-file-import"></i>
            <span class="text-[10px]">Import</span>
        </a>
        <a href="/profile" class="mobile-nav-item flex flex-col items-center gap-1 text-gray-500">
            <i class="far fa-user"></i>
            <span class="text-[10px]">Profile</span>
        </a>
    </nav>

    <!-- Auth Modal -->
    <div id="auth-modal" class="hidden fixed inset-0 z-[100] modal-backdrop flex items-center justify-center p-4">
        <div class="bg-black border border-white/10 rounded-3xl p-8 w-full max-w-sm shadow-2xl">
            <h2 id="auth-title" class="text-3xl font-bold mb-2">Welcome</h2>
            <p id="auth-subtitle" class="text-gray-400 mb-8">Sign in to track your shows</p>
            <form id="auth-form" class="space-y-4">
                <input id="auth-email" type="email" placeholder="Email" class="w-full bg-gray-900 border-none rounded-xl px-4 py-4 text-white focus:ring-2 focus:ring-yellow-500" required>
                <input id="auth-password" type="password" placeholder="Password" class="w-full bg-gray-900 border-none rounded-xl px-4 py-4 text-white focus:ring-2 focus:ring-yellow-500" required>
                <button type="submit" class="w-full gold-bg text-black font-bold py-4 rounded-xl hover:opacity-90 transition">Continue</button>
                <p id="auth-switch" class="text-center text-sm text-gray-500">
                    Don't have an account? <a href="#" onclick="toggleAuthMode()" class="gold-text font-bold">Sign Up</a>
                </p>
            </form>
        </div>
    </div>

    <!-- Search Modal -->
    <div id="search-modal" class="hidden fixed inset-0 z-[100] modal-backdrop flex items-center justify-center p-4">
        <div class="bg-black border border-white/10 rounded-3xl p-6 w-full max-w-2xl max-h-[85vh] overflow-hidden flex flex-col">
            <div class="flex items-center gap-4 mb-6">
                <div class="flex-1 bg-gray-900 rounded-2xl px-4 py-3 flex items-center gap-3">
                    <i class="fas fa-search text-gray-500"></i>
                    <input id="search-input" type="text" placeholder="What are you watching?" class="bg-transparent border-none w-full text-white focus:ring-0">
                </div>
                <button onclick="closeModals()" class="text-gray-500 hover:text-white">Cancel</button>
            </div>
            <div id="search-results" class="grid grid-cols-2 sm:grid-cols-3 gap-4 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        const API_BASE = "/api";
        let token = localStorage.getItem('tv_token');
        let currentAuthMode = 'login';

        // --- Routing ---
        function navigate(path) {
            const views = ['watchlist-view', 'import-view'];
            views.forEach(v => document.getElementById(v).classList.add('hidden'));
            
            if (path === '/import') {
                document.getElementById('import-view').classList.remove('hidden');
            } else {
                document.getElementById('watchlist-view').classList.remove('hidden');
                loadWatchlist();
            }

            // UI feedback
            document.querySelectorAll('.nav-item, .mobile-nav-item').forEach(el => {
                el.classList.remove('active', 'gold-text');
                if (el.getAttribute('href') === path) el.classList.add('active');
            });
        }

        window.onpopstate = () => navigate(window.location.pathname);
        document.querySelectorAll('a').forEach(a => {
            a.onclick = (e) => {
                e.preventDefault();
                const path = a.getAttribute('href');
                window.history.pushState({}, '', path);
                navigate(path);
            };
        });

        // --- Data ---
        async function loadWatchlist() {
            if (!token) return;
            const res = await fetch(`${API_BASE}/watchlist`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.status === 401) { logout(); return; }
            const data = await res.json();
            
            const grid = document.getElementById('media-grid');
            document.getElementById('watchlist-count').textContent = `${data.length} shows`;
            grid.innerHTML = data.map(item => `
                <div class="poster-card card-hover">
                    <img src="${item.poster_path ? 'https://image.tmdb.org/t/p/w400' + item.poster_path : 'https://via.placeholder.com/400x600?text=' + encodeURIComponent(item.title)}" class="w-full h-full object-cover">
                    <div class="poster-overlay">
                        <p class="font-bold text-xs truncate mb-2">${item.title}</p>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: 60%"></div>
                        </div>
                        <p class="text-[8px] mt-1 text-gray-400">12 of 20 episodes watched</p>
                    </div>
                </div>
            `).join('');
        }

        async function doSearch() {
            const query = document.getElementById('search-input').value.trim();
            if (query.length < 2) return;
            
            const res = await fetch(`${API_BASE}/search?query=${encodeURIComponent(query)}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            
            const results = document.getElementById('search-results');
            results.innerHTML = data.slice(0, 15).map(item => `
                <div class="poster-card card-hover cursor-pointer" onclick='addToWatchlist(${JSON.stringify(item).replace(/'/g, "&apos;")})'>
                    <img src="${item.poster_path ? 'https://image.tmdb.org/t/p/w300' + item.poster_path : 'https://via.placeholder.com/300x450'}" class="w-full h-full object-cover">
                    <div class="poster-overlay">
                        <p class="font-bold text-[10px] truncate">${item.name || item.title}</p>
                    </div>
                </div>
            `).join('');
        }

        async function addToWatchlist(item) {
            await fetch(`${API_BASE}/watchlist`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    tmdb_id: item.id,
                    title: item.name || item.title,
                    media_type: item.media_type || 'tv',
                    poster_path: item.poster_path
                })
            });
            closeModals();
            loadWatchlist();
        }

        // --- Import ---
        async function handleImport(input) {
            if (!input.files[0]) return;
            const status = document.getElementById('import-status');
            status.textContent = "Uploading...";
            
            const formData = new FormData();
            formData.append('file', input.files[0]);

            try {
                const res = await fetch(`${API_BASE}/import`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                const data = await res.json();
                status.textContent = data.message;
                status.classList.add('gold-text');
                setTimeout(() => navigate('/'), 2000);
            } catch (e) {
                status.textContent = "Import failed. Check file format.";
            }
        }

        // --- Auth ---
        function checkAuth() {
            if (!token) {
                document.getElementById('auth-modal').classList.remove('hidden');
            } else {
                loadWatchlist();
                navigate(window.location.pathname);
            }
        }

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            
            try {
                if (currentAuthMode === 'register') {
                    await fetch(`${API_BASE}/register`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({email, password})
                    });
                }
                const res = await fetch(`${API_BASE}/token`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await res.json();
                if (data.access_token) {
                    token = data.access_token;
                    localStorage.setItem('tv_token', token);
                    closeModals();
                    checkAuth();
                }
            } catch(e) {}
        }

        function toggleAuthMode() {
            currentAuthMode = currentAuthMode === 'login' ? 'register' : 'login';
            document.getElementById('auth-title').textContent = currentAuthMode === 'login' ? 'Welcome Back' : 'Join TV Time';
            document.getElementById('auth-switch').innerHTML = currentAuthMode === 'login' 
                ? `Don't have an account? <a href="#" onclick="toggleAuthMode()" class="gold-text font-bold">Sign Up</a>`
                : `Already have an account? <a href="#" onclick="toggleAuthMode()" class="gold-text font-bold">Sign In</a>`;
        }

        function logout() {
            localStorage.removeItem('tv_token');
            token = null;
            location.reload();
        }

        // --- Modals ---
        function searchMedia() { document.getElementById('search-modal').classList.remove('hidden'); document.getElementById('search-input').focus(); }
        function closeModals() { 
            document.getElementById('auth-modal').classList.add('hidden'); 
            document.getElementById('search-modal').classList.add('hidden'); 
        }

        document.getElementById('search-input').oninput = debounce(doSearch, 500);

        function debounce(func, timeout = 300){
            let timer;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => { func.apply(this, args); }, timeout);
            };
        }

        checkAuth();
    </script>
</body>
</html>
