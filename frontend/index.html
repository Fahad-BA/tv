<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Tracker - انما اييييييه</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen">
    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-indigo-400">TV Tracker</h1>
        <div class="flex gap-6">
            <a href="index.html" class="hover:text-indigo-400 transition">Dashboard</a>
            <a href="watchlist.html" class="hover:text-indigo-400 transition">Watchlist</a>
            <a href="import.html" class="hover:text-indigo-400 transition">Import</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-8">
        <section class="mb-12">
            <div class="flex justify-between items-end mb-6">
                <h2 class="text-3xl font-bold">Your Dashboard</h2>
                <button onclick="searchMedia()" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg transition">Add New</button>
            </div>
            <div id="media-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Data will be populated here via relative API calls -->
            </div>
        </section>
    </main>

    <script>
        // Use relative path for API to support subpath deployment (e.g. /tv/api/)
        const API_BASE = "api"; 

        async function searchMedia() {
            const query = prompt("Enter show or movie name:");
            if (!query) return;
            
            try {
                const response = await fetch(`${API_BASE}/search?query=${encodeURIComponent(query)}`);
                const data = await response.json();
                console.log("Search results:", data);
                // Update UI...
            } catch (err) {
                console.error("Failed to fetch:", err);
            }
        }
    </script>
</body>
</html>
