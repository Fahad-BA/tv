<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        :root { --gold: #FFD300; --dark: #000000; --gray: #1A1A1A; }
        body { background: var(--dark); color: #F5F5F5; font-family: 'Poppins', sans-serif; margin-bottom: 70px; }
        .gold-text { color: var(--gold); }
        .gold-bg { background: var(--gold); }
        .card { background: #111; border-radius: 12px; overflow: hidden; position: relative; }
        .progress-bar { height: 4px; background: #333; border-radius: 2px; }
        .progress-fill { height: 100%; background: var(--gold); transition: width 0.3s; }
        .modal-bg { background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        .episode-row { border-bottom: 1px solid #222; padding: 12px 0; }
        .watched-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #333; display: flex; items-center; justify-content: center; transition: 0.2s; }
        .watched-btn.active { background: var(--gold); border-color: var(--gold); color: black; }
    </style>
</head>
<body>

    <nav class="hidden md:flex sticky top-0 z-50 bg-black/90 px-8 py-4 justify-between border-b border-white/10">
        <h1 class="text-2xl font-bold gold-text">TV TIME</h1>
        <div class="flex gap-8">
            <a href="/" onclick="route(event, '/')" class="hover:text-yellow-500">Watchlist</a>
            <a href="/import" onclick="route(event, '/import')" class="hover:text-yellow-500">Import</a>
            <a href="/profile" onclick="route(event, '/profile')" class="hover:text-yellow-500">Profile</a>
        </div>
    </nav>

    <main id="app" class="max-w-6xl mx-auto p-4 md:p-8">
        <!-- Dashboard -->
        <div id="view-home">
            <h2 class="text-2xl font-bold mb-6">Watchlist</h2>
            <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4"></div>
        </div>

        <!-- Detail Modal -->
        <div id="modal-detail" class="hidden fixed inset-0 z-[100] modal-bg overflow-y-auto">
            <div class="max-w-4xl mx-auto p-4 md:p-12">
                <button onclick="closeModal()" class="mb-6 text-gray-400 hover:text-white"><i class="fas fa-arrow-left mr-2"></i> Back</button>
                <div id="detail-header" class="flex flex-col md:flex-row gap-8 mb-12"></div>
                <div id="season-list" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <!-- Mobile Nav -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-black border-t border-white/10 px-8 py-4 flex justify-between">
        <a href="/" onclick="route(event, '/')"><i class="fas fa-list-ul"></i></a>
        <button onclick="openSearch()"><i class="fas fa-plus gold-text"></i></button>
        <a href="/profile" onclick="route(event, '/profile')"><i class="far fa-user"></i></a>
    </nav>

    <script>
        const api = "/api";
        let token = localStorage.getItem('tv_token');

        async function req(path, method='GET', body=null) {
            const h = { 'Authorization': `Bearer ${token}` };
            if (body) h['Content-Type'] = 'application/json';
            const r = await fetch(api + path, { method, headers: h, body: body ? JSON.stringify(body) : null });
            return r.json();
        }

        async function loadDashboard() {
            const data = await req('/watchlist');
            const grid = document.getElementById('grid');
            grid.innerHTML = data.map(item => `
                <div class="card cursor-pointer" onclick="openShow(${item.tmdb_id})">
                    <img src="https://image.tmdb.org/t/p/w300${item.poster_path}" class="w-full aspect-[2/3] object-cover">
                    <div class="p-3">
                        <p class="font-bold text-xs truncate">${item.title}</p>
                        <div class="progress-bar mt-2"><div class="progress-fill" style="width: 45%"></div></div>
                    </div>
                </div>
            `).join('');
        }

        async function openShow(id) {
            const seasons = await req(`/shows/${id}/seasons`);
            const modal = document.getElementById('modal-detail');
            modal.classList.remove('hidden');
            
            document.getElementById('season-list').innerHTML = seasons.map(s => `
                <div class="gray-bg p-6 rounded-2xl">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold">Season ${s.season_number}</h3>
                        <button onclick="markSeason(${id}, ${s.season_number}, ${s.episodes.length})" class="text-xs gold-text">Mark Season Watched</button>
                    </div>
                    <div class="space-y-2">
                        ${s.episodes.map(e => `
                            <div class="episode-row flex justify-between items-center">
                                <div><p class="text-sm font-medium">E${e.episode_number} • ${e.name}</p></div>
                                <button onclick="toggleEp(this, ${id}, ${s.season_number}, ${e.episode_number})" class="watched-btn ${e.watched ? 'active' : ''}">
                                    <i class="fas fa-check"></i>
                                </button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        async function toggleEp(btn, showId, s, e) {
            const res = await req(`/episodes/${showId}/${s}/${e}/toggle`, 'POST');
            btn.classList.toggle('active', res.watched);
        }

        async function markSeason(showId, sNum, count) {
            const eps = Array.from({length: count}, (_, i) => i + 1);
            await req(`/shows/${showId}/seasons/toggle`, 'POST', { season_number: sNum, episodes: eps });
            openShow(showId);
        }

        function closeModal() { document.getElementById('modal-detail').classList.add('hidden'); }
        function route(e, path) { e.preventDefault(); window.history.pushState({}, '', path); loadDashboard(); }

        if (!token) { /* Simplified Auth Redirect */ }
        loadDashboard();
    </script>
</body>
</html>
