<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎬 TV Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        :root { --gold: #FFD300; --dark: #000000; --gray: #111111; }
        body { background: var(--dark); color: #F5F5F5; font-family: 'Poppins', sans-serif; margin-bottom: 90px; -webkit-tap-highlight-color: transparent; }
        .gold-text { color: var(--gold); }
        .gold-bg { background: var(--gold); }
        .card { background: #161616; border-radius: 16px; overflow: hidden; transition: transform 0.2s; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .card:active { transform: scale(0.96); }
        .progress-bar { height: 5px; background: #333; border-radius: 3px; }
        .progress-fill { height: 100%; background: var(--gold); }
        .modal-bg { background: rgba(0,0,0,0.98); backdrop-blur: 20px; -webkit-backdrop-filter: blur(20px); }
        .shelf-container { display: flex; overflow-x: auto; gap: 14px; padding: 4px 0 16px; scrollbar-width: none; -ms-overflow-style: none; }
        .shelf-container::-webkit-scrollbar { display: none; }
        .shelf-item { flex: 0 0 140px; }
        .profile-banner { height: 320px; background-size: cover; background-position: center; position: relative; transition: background-image 0.5s ease-in-out; }
        .profile-banner::after { content: ''; position: absolute; inset: 0; background: linear-gradient(transparent, var(--dark)); }
        
        /* Native-style Nav */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 85px; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-t: 1px solid rgba(255,255,255,0.05); z-index: 1000; 
            display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-link { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; color: #666; transition: 0.2s; }
        .nav-link.active { color: var(--gold); }
        .nav-link i { font-size: 20px; }

        .btn-main { background: var(--gold); color: black; font-weight: 700; border-radius: 14px; padding: 14px; text-align: center; }
        .input-dark { background: #111; border: 1px solid #222; border-radius: 14px; padding: 16px; width: 100%; color: white; outline: none; }
        .input-dark:focus { border-color: var(--gold); }
        
        .backdrop-thumb { border-radius: 12px; border: 2px solid transparent; cursor: pointer; transition: 0.2s; overflow: hidden; aspect-ratio: 16/9; }
        .backdrop-thumb.selected { border-color: var(--gold); scale: 1.05; }
    </style>
</head>
<body>

    <!-- Header (Desktop Only) -->
    <header class="hidden md:flex sticky top-0 z-50 bg-black/90 px-8 py-4 justify-between border-b border-white/10">
        <a href="/" onclick="route(event, '/')" class="text-3xl font-bold">🎬</a>
        <nav class="flex gap-10 font-semibold">
            <a href="/" onclick="route(event, '/')" class="nav-desktop hover:text-yellow-500">Watchlist</a>
            <a href="/import" onclick="route(event, '/import')" class="nav-desktop hover:text-yellow-500">Import</a>
            <a href="/profile" onclick="route(event, '/profile')" class="nav-desktop hover:text-yellow-500">Profile</a>
        </nav>
        <button onclick="logout()" class="text-gray-500 text-sm">Sign Out</button>
    </header>

    <main id="app" class="max-w-6xl mx-auto p-4 md:p-10">
        
        <div id="view-home">
            <section class="mb-10">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">🔥 Trending Now</h2>
                <div id="trending-shelf" class="shelf-container"></div>
            </section>

            <section>
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">My Watchlist</h2>
                    <span id="watchlist-count" class="text-gray-500 font-medium">0 items</span>
                </div>
                <div id="watchlist-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-5"></div>
            </section>
        </div>

        <div id="view-profile" class="hidden -mt-10 -mx-4 md:-mx-10">
            <div id="profile-banner" class="profile-banner flex items-end px-6 pb-10">
                <div class="relative z-10 flex flex-col items-center text-center w-full max-w-6xl mx-auto">
                    <div id="profile-avatar" class="w-32 h-32 rounded-3xl border-4 border-black bg-gray-900 overflow-hidden shadow-2xl mb-4"></div>
                    <h2 id="profile-name" class="text-4xl font-bold tracking-tight">Username</h2>
                    <p id="profile-bio" class="text-gray-400 mt-2 text-sm max-w-xs">TV Enthusiast</p>
                    <button onclick="openEditProfile()" class="mt-6 bg-white/10 hover:bg-white/20 px-8 py-3 rounded-2xl text-xs font-bold transition">Edit Profile</button>
                </div>
            </div>
            
            <div class="p-6 grid grid-cols-2 gap-4 max-w-6xl mx-auto">
                <div class="bg-[#111] p-6 rounded-3xl text-center border border-white/5">
                    <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-2">Time Spent</p>
                    <div id="stat-time" class="text-xl font-bold">0m 0d</div>
                </div>
                <div class="bg-[#111] p-6 rounded-3xl text-center border border-white/5">
                    <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-2">Episodes</p>
                    <div id="stat-episodes" class="text-xl font-bold">0</div>
                </div>
            </div>
        </div>

        <div id="view-import" class="hidden text-center py-24 px-4">
            <div class="max-w-md mx-auto p-12 bg-[#111] rounded-[40px] border border-white/5 shadow-2xl">
                <div class="w-20 h-20 gold-bg rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-xl">
                    <i class="fas fa-file-zipper text-3xl text-black"></i>
                </div>
                <h2 class="text-3xl font-bold mb-4">Sync History</h2>
                <p class="text-gray-500 mb-10 text-sm leading-relaxed">Upload your TV Time .zip file. We'll parse every show and episode history for you.</p>
                <input type="file" id="import-file" class="hidden" accept=".zip,.csv" onchange="handleImport(this)">
                <button onclick="document.getElementById('import-file').click()" class="btn-main w-full shadow-lg">Upload Archive</button>
                <p id="import-status" class="mt-6 text-sm gold-text font-medium"></p>
            </div>
        </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav md:hidden">
        <a href="/" onclick="route(event, '/')" class="nav-link active" id="nav-home">
            <i class="fas fa-list-ul"></i>
            <span>Watchlist</span>
        </a>
        <a href="/import" onclick="route(event, '/import')" class="nav-link" id="nav-import">
            <i class="fas fa-file-import"></i>
            <span>Import</span>
        </a>
        <a href="/profile" onclick="route(event, '/profile')" class="nav-link" id="nav-profile">
            <i class="fas fa-user-circle"></i>
            <span>Me</span>
        </a>
    </nav>

    <!-- Profile Edit Modal -->
    <div id="modal-edit-profile" class="hidden fixed inset-0 z-[1100] modal-bg flex items-center justify-center p-4">
        <div class="bg-[#0c0c0c] border border-white/10 rounded-[32px] p-8 w-full max-w-sm max-h-[90vh] overflow-y-auto">
            <h3 class="text-2xl font-bold mb-8">Personalize</h3>
            <div class="space-y-6">
                <!-- Avatar Upload -->
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 mb-2 block">Avatar Picture</label>
                    <div class="flex items-center gap-4">
                        <div id="edit-avatar-preview" class="w-16 h-16 rounded-2xl bg-gray-900 border border-white/5 overflow-hidden"></div>
                        <input type="file" id="avatar-input" class="hidden" accept="image/*" onchange="previewAvatar(this)">
                        <button onclick="document.getElementById('avatar-input').click()" class="text-xs gold-text font-bold">Upload New</button>
                    </div>
                </div>

                <!-- Backdrop Selector -->
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 mb-3 block">Profile Header Backdrop</label>
                    <select id="backdrop-show-select" class="input-dark mb-4 text-sm" onchange="fetchShowBackdrops(this.value)">
                        <option value="">Select a show to pick a backdrop</option>
                    </select>
                    <div id="backdrop-options" class="grid grid-cols-2 gap-3"></div>
                </div>

                <input id="edit-username" type="text" placeholder="Username" class="input-dark text-sm">
                <textarea id="edit-bio" placeholder="Short Bio" class="input-dark text-sm h-24"></textarea>
                
                <button onclick="saveProfile()" id="save-profile-btn" class="btn-main w-full shadow-lg">Save Changes</button>
                <button onclick="closeModals()" class="w-full text-gray-600 text-sm font-bold">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const API = "/api";
        let token = localStorage.getItem('tv_token');
        let selectedBackdrop = "";

        async function req(p, m='GET', b=null, isFormData=false) {
            const h = { 'Authorization': `Bearer ${token}` };
            if (!isFormData && b) h['Content-Type'] = 'application/json';
            const r = await fetch(API + p, { method: m, headers: h, body: b ? (isFormData ? b : JSON.stringify(b)) : null });
            return r.json();
        }

        async function loadTrending() {
            const items = await req('/trending');
            document.getElementById('trending-shelf').innerHTML = items.slice(0,10).map(i => `
                <div class="shelf-item card">
                    <div class="relative">
                        <img src="https://image.tmdb.org/t/p/w300${i.poster_path}" class="w-full aspect-[2/3] object-cover">
                        <button onclick="quickAdd(${i.id}, '${i.name}', '${i.poster_path}')" class="absolute top-2 right-2 w-9 h-9 rounded-full gold-bg text-black flex items-center justify-center shadow-lg"><i class="fas fa-plus text-xs"></i></button>
                    </div>
                    <div class="p-3"><p class="text-[10px] font-bold truncate">${i.name}</p></div>
                </div>
            `).join('');
        }

        async function quickAdd(id, title, poster) {
            await req('/watchlist', 'POST', { tmdb_id: id, title, media_type: 'tv', poster_path: poster });
            loadWatchlist();
        }

        async function loadWatchlist() {
            const data = await req('/watchlist');
            document.getElementById('watchlist-count').textContent = `${data.length} items`;
            document.getElementById('watchlist-grid').innerHTML = data.map(i => `
                <div class="card cursor-pointer" onclick="openShow(${i.tmdb_id})">
                    <img src="https://image.tmdb.org/t/p/w400${i.poster_path}" class="w-full aspect-[2/3] object-cover">
                    <div class="p-4">
                        <p class="font-bold text-xs truncate">${i.title}</p>
                        <div class="progress-bar mt-3"><div class="progress-fill" style="width: 40%"></div></div>
                    </div>
                </div>
            `).join('');
            
            // Populate backdrop dropdown
            const select = document.getElementById('backdrop-show-select');
            select.innerHTML = '<option value="">Select a show for backdrop</option>' + 
                data.map(i => `<option value="${i.tmdb_id}">${i.title}</option>`).join('');
        }

        async function loadProfile() {
            const user = await req('/me');
            const stats = await req('/stats');
            document.getElementById('profile-name').textContent = user.username || user.email.split('@')[0];
            document.getElementById('profile-bio').textContent = user.bio || "TV Enthusiast";
            document.getElementById('profile-avatar').innerHTML = `<img src="${user.avatar_url || 'https://api.dicebear.com/7.x/bottts/svg?seed=minimal'}" class="w-full h-full object-cover">`;
            document.getElementById('profile-banner').style.backgroundImage = `url(${user.backdrop_url || 'https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=2000'})`;
            document.getElementById('stat-time').textContent = `${stats.time_spent.months}m ${stats.time_spent.days}d`;
            document.getElementById('stat-episodes').textContent = stats.total_episodes;
            
            document.getElementById('edit-username').value = user.username || "";
            document.getElementById('edit-bio').value = user.bio || "";
            document.getElementById('edit-avatar-preview').innerHTML = `<img src="${user.avatar_url || 'https://api.dicebear.com/7.x/bottts/svg?seed=minimal'}" class="w-full h-full object-cover">`;
        }

        async function fetchShowBackdrops(id) {
            if (!id) return;
            const images = await req(`/me/followed-shows-backdrops?show_id=${id}`);
            const container = document.getElementById('backdrop-options');
            container.innerHTML = images.map(img => `
                <div class="backdrop-thumb" onclick="selectBackdrop(this, '${img.url}')">
                    <img src="${img.url}" class="w-full h-full object-cover">
                </div>
            `).join('');
        }

        function selectBackdrop(el, url) {
            document.querySelectorAll('.backdrop-thumb').forEach(t => t.classList.remove('selected'));
            el.classList.add('selected');
            selectedBackdrop = url;
        }

        async function previewAvatar(input) {
            if (!input.files[0]) return;
            const formData = new FormData();
            formData.append('file', input.files[0]);
            const res = await req('/me/avatar', 'POST', formData, true);
            document.getElementById('edit-avatar-preview').innerHTML = `<img src="${res.avatar_url}" class="w-full h-full object-cover">`;
        }

        async function saveProfile() {
            const btn = document.getElementById('save-profile-btn');
            btn.textContent = "Saving...";
            const data = {
                username: document.getElementById('edit-username').value,
                bio: document.getElementById('edit-bio').value,
                backdrop_url: selectedBackdrop || undefined
            };
            await req('/me', 'PATCH', data);
            closeModals();
            loadProfile();
            btn.textContent = "Save Changes";
        }

        async function handleImport(input) {
            if (!input.files[0]) return;
            const status = document.getElementById('import-status');
            status.textContent = "Importing all records...";
            const formData = new FormData();
            formData.append('file', input.files[0]);
            const res = await req('/import', 'POST', formData, true);
            status.textContent = res.message;
            setTimeout(() => route(null, '/'), 2000);
        }

        function route(e, path) {
            if (e) e.preventDefault();
            window.history.pushState({}, '', path);
            document.querySelectorAll('main > div').forEach(d => d.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            
            if (path === '/profile') {
                document.getElementById('view-profile').classList.remove('hidden');
                document.getElementById('nav-profile').classList.add('active');
                loadProfile();
            } else if (path === '/import') {
                document.getElementById('view-import').classList.remove('hidden');
                document.getElementById('nav-import').classList.add('active');
            } else {
                document.getElementById('view-home').classList.remove('hidden');
                document.getElementById('nav-home').classList.add('active');
                loadWatchlist();
                loadTrending();
            }
        }

        function openEditProfile() { document.getElementById('modal-edit-profile').classList.remove('hidden'); }
        function closeModals() { document.getElementById('modal-edit-profile').classList.add('hidden'); }
        function logout() { localStorage.clear(); location.reload(); }
        window.onpopstate = () => route(null, window.location.pathname);
        route(null, window.location.pathname);
    </script>
</body>
</html>
